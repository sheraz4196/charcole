# .github/workflows/template-smoke.yml

name: Template Smoke Test

on:
  push:
    paths:
      - "bin/**"
      - "template/**"
      - "packages/**"
  pull_request:
    paths:
      - "bin/**"
      - "template/**"
      - "packages/**"

jobs:
  smoke-test:
    name: Template Generation & Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install root CLI dependencies
        run: npm ci

      # ─── Test 1: JS template, no optional modules ───────────────────────────

      - name: Generate JS project (no modules)
        run: |
          mkdir -p /tmp/smoke-js
          cd /tmp/smoke-js
          node $GITHUB_WORKSPACE/bin/index.js --preset '{"projectName":"smoke-js","language":"js","auth":false,"swagger":false,"includePayments":false}'

      - name: Verify JS project was generated
        run: |
          test -f /tmp/smoke-js/smoke-js/package.json || (echo "FAIL: package.json not found" && exit 1)
          test -f /tmp/smoke-js/smoke-js/src/app.js || (echo "FAIL: app.js not found" && exit 1)
          test -f /tmp/smoke-js/smoke-js/src/server.js || (echo "FAIL: server.js not found" && exit 1)
          echo "JS project generated successfully"

      - name: Install JS project dependencies
        run: npm install
        working-directory: /tmp/smoke-js/smoke-js

      - name: Start JS project and check health endpoint
        run: |
          # Copy .env.example to .env so the server can start
          cp .env.example .env 2>/dev/null || true

          # Start the server in the background
          node src/server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait up to 10 seconds for the server to be ready
          for i in $(seq 1 10); do
            sleep 1
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Health endpoint responded on attempt $i"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "❌ Server did not respond after 10 seconds"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
          done

          # Verify health response is what we expect
          RESPONSE=$(curl -s http://localhost:3000/health)
          echo "Health response: $RESPONSE"

          # Kill the server
          kill $SERVER_PID 2>/dev/null || true
          echo "Server stopped"
        working-directory: /tmp/smoke-js/smoke-js
        env:
          PORT: 3000
          NODE_ENV: test
          JWT_SECRET: smoke-test-secret-not-real

      # ─── Test 2: TS template, no optional modules ───────────────────────────

      - name: Generate TS project (no modules)
        run: |
          mkdir -p /tmp/smoke-ts
          cd /tmp/smoke-ts
          node $GITHUB_WORKSPACE/bin/index.js --preset '{"projectName":"smoke-ts","language":"ts","auth":false,"swagger":false,"includePayments":false}'

      - name: Verify TS project was generated
        run: |
          test -f /tmp/smoke-ts/smoke-ts/package.json || (echo "FAIL: package.json not found" && exit 1)
          test -f /tmp/smoke-ts/smoke-ts/src/app.ts || (echo "FAIL: app.ts not found" && exit 1)
          echo "TS project generated successfully"

      - name: Install TS project dependencies
        run: npm install
        working-directory: /tmp/smoke-ts/smoke-ts

      - name: Build TS project
        run: npm run build
        working-directory: /tmp/smoke-ts/smoke-ts
        # The TS template should have a build script that compiles TypeScript.
        # If this fails, the template has a TypeScript compilation error.

      - name: Start TS project and check health endpoint
        run: |
          cp .env.example .env 2>/dev/null || true
          node dist/server.js &
          SERVER_PID=$!

          for i in $(seq 1 10); do
            sleep 1
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "✅ TS health endpoint responded"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "❌ TS server did not respond"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
          done

          kill $SERVER_PID 2>/dev/null || true
        working-directory: /tmp/smoke-ts/smoke-ts
        env:
          PORT: 3001
          NODE_ENV: test
      # ─── Test 3: JS template with auth, swagger, and payments ───────────────

      - name: Generate JS project (with modules)
        run: |
          mkdir -p /tmp/smoke-js-full
          cd /tmp/smoke-js-full
          node $GITHUB_WORKSPACE/bin/index.js --preset '{"projectName":"smoke-js-full","language":"js","auth":true,"swagger":true,"includePayments":true,"paymentProvider":"stripe"}'

      - name: Verify JS full project was generated
        run: |
          test -f /tmp/smoke-js-full/smoke-js-full/package.json || (echo "FAIL: package.json not found" && exit 1)
          echo "JS full project generated successfully"

      - name: Install JS full project dependencies
        run: npm install
        working-directory: /tmp/smoke-js-full/smoke-js-full

      - name: Start JS full project and check health endpoint
        run: |
          cp .env.example .env 2>/dev/null || true
          node src/server.js &
          SERVER_PID=$!

          for i in $(seq 1 10); do
            sleep 1
            if curl -sf http://localhost:3002/health > /dev/null 2>&1; then
              echo "✅ JS full health endpoint responded"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "❌ JS full server did not respond"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
          done

          kill $SERVER_PID 2>/dev/null || true
        working-directory: /tmp/smoke-js-full/smoke-js-full
        env:
          PORT: 3002
          NODE_ENV: test
          JWT_SECRET: smoke-test-secret-not-real
          STRIPE_SECRET_KEY: sk_test_fake_key_for_smoke_test

      # ─── Cleanup ─────────────────────────────────────────────────────────────

      - name: Cleanup generated projects
        if: always()
        run: |
          rm -rf /tmp/smoke-js /tmp/smoke-ts /tmp/smoke-js-full
          echo "Cleanup complete"
